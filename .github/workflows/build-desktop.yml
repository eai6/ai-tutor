name: Build Desktop Apps

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number (e.g., 1.0.0)'
        required: true
        default: '1.0.0'

env:
  APP_NAME: "AI-Tutor"
  PYTHON_VERSION: "3.11"

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-desktop.txt
          pip install pyinstaller

      - name: Create .env template for distribution
        run: |
          echo "# AI Tutor Configuration" > .env
          echo "# Get your API key from https://console.anthropic.com" >> .env
          echo "ANTHROPIC_API_KEY=your-api-key-here" >> .env
          echo "FLASK_ENV=production" >> .env
        shell: bash

      - name: Build Windows executable
        run: |
          pyinstaller --name="${{ env.APP_NAME }}" `
            --onefile `
            --windowed `
            --icon=assets/icon.ico `
            --add-data="templates;templates" `
            --add-data="config;config" `
            --add-data="curricula;curricula" `
            --add-data="assets;assets" `
            --add-data=".env;." `
            --hidden-import=webview `
            --hidden-import=flask `
            --hidden-import=anthropic `
            desktop.py
        env:
          ANTHROPIC_API_KEY: "placeholder-for-build"

      - name: Create installer with Inno Setup
        run: |
          iscc installer/windows-setup.iss
        continue-on-error: true

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_NAME }}-Windows-x64
          path: dist/${{ env.APP_NAME }}.exe

      - name: Upload Windows installer
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: ${{ env.APP_NAME }}-Windows-Installer
          path: installer/Output/*.exe
        continue-on-error: true

  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-desktop.txt
          pip install pyinstaller

      - name: Create .env template for distribution
        run: |
          echo "# AI Tutor Configuration" > .env
          echo "# Get your API key from https://console.anthropic.com" >> .env
          echo "ANTHROPIC_API_KEY=your-api-key-here" >> .env
          echo "FLASK_ENV=production" >> .env

      - name: Build macOS app
        run: |
          pyinstaller --name="${{ env.APP_NAME }}" \
            --onefile \
            --windowed \
            --icon=assets/icon.icns \
            --add-data="templates:templates" \
            --add-data="config:config" \
            --add-data="curricula:curricula" \
            --add-data="assets:assets" \
            --add-data=".env:." \
            --hidden-import=webview \
            --hidden-import=flask \
            --hidden-import=anthropic \
            --osx-bundle-identifier=org.teveta.aitutor \
            desktop.py
        env:
          ANTHROPIC_API_KEY: "placeholder-for-build"

      - name: Create DMG
        run: |
          brew install create-dmg
          create-dmg \
            --volname "${{ env.APP_NAME }}" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 100 \
            --icon "${{ env.APP_NAME }}.app" 150 190 \
            --hide-extension "${{ env.APP_NAME }}.app" \
            --app-drop-link 450 190 \
            "${{ env.APP_NAME }}-macOS.dmg" \
            "dist/${{ env.APP_NAME }}.app"
        continue-on-error: true

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_NAME }}-macOS
          path: |
            dist/${{ env.APP_NAME }}.app
            ${{ env.APP_NAME }}-macOS.dmg

  build-macos-arm:
    runs-on: macos-14  # Apple Silicon runner
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-desktop.txt
          pip install pyinstaller

      - name: Create .env template for distribution
        run: |
          echo "# AI Tutor Configuration" > .env
          echo "# Get your API key from https://console.anthropic.com" >> .env
          echo "ANTHROPIC_API_KEY=your-api-key-here" >> .env
          echo "FLASK_ENV=production" >> .env

      - name: Build macOS ARM app
        run: |
          pyinstaller --name="${{ env.APP_NAME }}" \
            --onefile \
            --windowed \
            --icon=assets/icon.icns \
            --add-data="templates:templates" \
            --add-data="config:config" \
            --add-data="curricula:curricula" \
            --add-data="assets:assets" \
            --add-data=".env:." \
            --hidden-import=webview \
            --hidden-import=flask \
            --hidden-import=anthropic \
            --osx-bundle-identifier=org.teveta.aitutor \
            --target-arch=arm64 \
            desktop.py
        env:
          ANTHROPIC_API_KEY: "placeholder-for-build"

      - name: Upload macOS ARM artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_NAME }}-macOS-ARM64
          path: dist/${{ env.APP_NAME }}.app

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.0-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-desktop.txt
          pip install pyinstaller

      - name: Create .env template for distribution
        run: |
          echo "# AI Tutor Configuration" > .env
          echo "# Get your API key from https://console.anthropic.com" >> .env
          echo "ANTHROPIC_API_KEY=your-api-key-here" >> .env
          echo "FLASK_ENV=production" >> .env

      - name: Build Linux executable
        run: |
          pyinstaller --name="${{ env.APP_NAME }}" \
            --onefile \
            --windowed \
            --icon=assets/icon.png \
            --add-data="templates:templates" \
            --add-data="config:config" \
            --add-data="curricula:curricula" \
            --add-data="assets:assets" \
            --add-data=".env:." \
            --hidden-import=webview \
            --hidden-import=flask \
            --hidden-import=anthropic \
            desktop.py
        env:
          ANTHROPIC_API_KEY: "placeholder-for-build"

      - name: Create AppImage
        run: |
          # Download appimagetool
          wget -q https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x appimagetool-x86_64.AppImage
          
          # Create AppDir structure
          mkdir -p AppDir/usr/bin AppDir/usr/share/applications AppDir/usr/share/icons/hicolor/256x256/apps
          cp dist/${{ env.APP_NAME }} AppDir/usr/bin/
          cp assets/icon.png AppDir/usr/share/icons/hicolor/256x256/apps/${{ env.APP_NAME }}.png
          cp assets/icon.png AppDir/${{ env.APP_NAME }}.png
          
          # Create desktop file
          cat > AppDir/${{ env.APP_NAME }}.desktop << EOF
          [Desktop Entry]
          Name=${{ env.APP_NAME }}
          Exec=${{ env.APP_NAME }}
          Icon=${{ env.APP_NAME }}
          Type=Application
          Categories=Education;
          EOF
          
          cp AppDir/${{ env.APP_NAME }}.desktop AppDir/usr/share/applications/
          
          # Create AppRun
          cat > AppDir/AppRun << 'EOF'
          #!/bin/bash
          SELF=$(readlink -f "$0")
          HERE=${SELF%/*}
          exec "${HERE}/usr/bin/${{ env.APP_NAME }}" "$@"
          EOF
          chmod +x AppDir/AppRun
          
          # Build AppImage
          ./appimagetool-x86_64.AppImage AppDir ${{ env.APP_NAME }}-x86_64.AppImage
        continue-on-error: true

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_NAME }}-Linux-x64
          path: |
            dist/${{ env.APP_NAME }}
            ${{ env.APP_NAME }}-x86_64.AppImage

  create-release:
    needs: [build-windows, build-macos, build-macos-arm, build-linux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            artifacts/**/*
          draft: false
          prerelease: false
          generate_release_notes: true
          body: |
            ## Installation
            
            1. Download the appropriate file for your platform
            2. Run the application
            3. On first launch, you'll be prompted to enter your Claude API key
               - Get your key from https://console.anthropic.com
            
            ## Configuration
            
            Create a `.env` file in the application directory with:
            ```
            ANTHROPIC_API_KEY=your-api-key-here
            ```
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
