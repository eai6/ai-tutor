name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12']

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov

      - name: Create .env file from secrets
        run: |
          echo "ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}" > .env
          echo "FLASK_ENV=testing" >> .env
          echo "✅ .env file created"
        
      - name: Run linting
        run: |
          pip install flake8
          # Stop the build if there are Python syntax errors or undefined names
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          # Exit-zero treats all errors as warnings
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
        continue-on-error: true

      - name: Run tests
        run: |
          pytest tests/ -v --cov=. --cov-report=xml
        continue-on-error: true
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Check import structure
        run: |
          python -c "from app import app; print('✅ App imports successfully')"
          python -c "from database import Database; print('✅ Database imports successfully')"
          python -c "from curriculum_content import get_curriculum; print('✅ Curriculum imports successfully')"
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

  lint-config:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate JSON configs
        run: |
          python -c "
          import json
          import glob
          
          errors = []
          for f in glob.glob('config/**/*.json', recursive=True):
              try:
                  with open(f) as fp:
                      json.load(fp)
                  print(f'✅ {f}')
              except Exception as e:
                  errors.append(f'{f}: {e}')
                  print(f'❌ {f}: {e}')
          
          for f in glob.glob('curricula/**/*.json', recursive=True):
              try:
                  with open(f) as fp:
                      json.load(fp)
                  print(f'✅ {f}')
              except Exception as e:
                  errors.append(f'{f}: {e}')
                  print(f'❌ {f}: {e}')
          
          if errors:
              exit(1)
          "
