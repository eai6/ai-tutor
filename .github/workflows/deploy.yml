name: Deploy

on:
  push:
    branches: [main]

env:
  ACR: ${{ secrets.ACR_LOGIN_SERVER }}
  RG: ${{ secrets.AZURE_RESOURCE_GROUP }}
  APP: ${{ secrets.CONTAINER_APP_NAME }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Login to ACR
        run: az acr login --name ${ACR%%.*}

      - name: Build and push Docker image
        run: |
          docker build -t $ACR/aitutor:${{ github.sha }} -t $ACR/aitutor:latest .
          docker push $ACR/aitutor:${{ github.sha }}
          docker push $ACR/aitutor:latest

      - name: Deploy to Container App
        run: |
          az containerapp update \
            --name $APP \
            --resource-group $RG \
            --image $ACR/aitutor:${{ github.sha }}
