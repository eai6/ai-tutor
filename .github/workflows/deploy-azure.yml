name: Deploy to Azure

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - staging
          - prod

env:
  AZURE_WEBAPP_NAME: 'aitutor-app'  # Will be overwritten by infrastructure outputs
  PYTHON_VERSION: '3.11'

jobs:
  # Infrastructure deployment (optional - run manually or on infra changes)
  deploy-infrastructure:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    environment: ${{ github.event.inputs.environment || 'dev' }}
    outputs:
      webAppName: ${{ steps.deploy.outputs.webAppName }}
      webAppUrl: ${{ steps.deploy.outputs.webAppUrl }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy Infrastructure
        id: deploy
        uses: azure/arm-deploy@v1
        with:
          resourceGroupName: ${{ secrets.AZURE_RESOURCE_GROUP }}
          template: ./azure/main.bicep
          parameters: >
            environment=${{ github.event.inputs.environment || 'dev' }}
            baseName=aitutor
            sqlAdminLogin=${{ secrets.AZURE_SQL_ADMIN_LOGIN }}
            sqlAdminPassword=${{ secrets.AZURE_SQL_ADMIN_PASSWORD }}
            anthropicApiKey=${{ secrets.ANTHROPIC_API_KEY }}
          failOnStdErr: false

      - name: Output deployment info
        run: |
          echo "Web App URL: ${{ steps.deploy.outputs.webAppUrl }}"
          echo "Web App Name: ${{ steps.deploy.outputs.webAppName }}"

  # Application deployment
  deploy-application:
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'dev' }}
    needs: [deploy-infrastructure]
    if: always() && (needs.deploy-infrastructure.result == 'success' || needs.deploy-infrastructure.result == 'skipped')
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Create virtual environment and install dependencies
        run: |
          python -m venv venv
          source venv/bin/activate
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-azure.txt

      - name: Run tests
        run: |
          source venv/bin/activate
          pip install pytest
          pytest tests/ -v --tb=short || true
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          FLASK_ENV: testing

      - name: Create deployment package
        run: |
          # Create deployment package
          mkdir -p deploy
          
          # Copy application files
          cp -r templates deploy/
          cp -r config deploy/
          cp -r curricula deploy/
          cp -r azure deploy/
          cp app.py deploy/
          cp database.py deploy/
          cp curriculum_content.py deploy/
          cp multimedia_resources.py deploy/
          cp auth.py deploy/ 2>/dev/null || true
          cp learning_session.py deploy/ 2>/dev/null || true
          cp student_tracking.py deploy/ 2>/dev/null || true
          cp requirements.txt deploy/
          cp requirements-azure.txt deploy/
          
          # Create startup script
          cat > deploy/startup.sh << 'EOF'
          #!/bin/bash
          pip install -r requirements.txt
          pip install -r requirements-azure.txt
          gunicorn --bind=0.0.0.0:8000 --timeout 600 --workers 4 app:app
          EOF
          chmod +x deploy/startup.sh
          
          # Create web.config for Azure
          cat > deploy/web.config << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <configuration>
            <system.webServer>
              <handlers>
                <add name="PythonHandler" path="*" verb="*" modules="httpPlatformHandler" resourceType="Unspecified"/>
              </handlers>
              <httpPlatform processPath="%home%\python311\python.exe"
                            arguments="-m gunicorn --bind=0.0.0.0:%HTTP_PLATFORM_PORT% app:app"
                            stdoutLogEnabled="true"
                            stdoutLogFile="%home%\LogFiles\python.log"
                            startupTimeLimit="60"
                            processesPerApplication="4">
                <environmentVariables>
                  <environmentVariable name="PORT" value="%HTTP_PLATFORM_PORT%" />
                </environmentVariables>
              </httpPlatform>
            </system.webServer>
          </configuration>
          EOF
          
          cd deploy && zip -r ../deploy.zip .

      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Get Web App Name
        id: webapp
        run: |
          # Get web app name from resource group
          WEBAPP_NAME=$(az webapp list --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} --query "[?contains(name, 'aitutor')].name" -o tsv | head -1)
          echo "name=$WEBAPP_NAME" >> $GITHUB_OUTPUT
          echo "Deploying to: $WEBAPP_NAME"

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v2
        with:
          app-name: ${{ steps.webapp.outputs.name }}
          package: deploy.zip

      - name: Configure App Settings
        run: |
          az webapp config appsettings set \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --name ${{ steps.webapp.outputs.name }} \
            --settings \
              FLASK_ENV=production \
              WEBSITE_STARTUP_COMMAND="gunicorn --bind=0.0.0.0:8000 --timeout 600 app:app"

      - name: Output deployment URL
        run: |
          WEBAPP_URL=$(az webapp show --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} --name ${{ steps.webapp.outputs.name }} --query "defaultHostName" -o tsv)
          echo "🚀 Deployed to: https://$WEBAPP_URL"
          echo "## Deployment Complete! 🎉" >> $GITHUB_STEP_SUMMARY
          echo "**URL:** https://$WEBAPP_URL" >> $GITHUB_STEP_SUMMARY

  # Database migration (runs after app deployment)
  migrate-database:
    runs-on: ubuntu-latest
    needs: [deploy-application]
    environment: ${{ github.event.inputs.environment || 'dev' }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Run Database Migrations
        run: |
          # Get SQL Server details
          SQL_SERVER=$(az sql server list --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} --query "[?contains(name, 'aitutor')].fullyQualifiedDomainName" -o tsv | head -1)
          SQL_DB=$(az sql db list --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} --server $(az sql server list --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} --query "[?contains(name, 'aitutor')].name" -o tsv | head -1) --query "[?contains(name, 'aitutor')].name" -o tsv | head -1)
          
          echo "SQL Server: $SQL_SERVER"
          echo "SQL Database: $SQL_DB"
          
          # Note: For actual migrations, use sqlcmd or a Python migration script
          # This is a placeholder for migration logic
          echo "Database migration would run here"
        continue-on-error: true
